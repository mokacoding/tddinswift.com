{{ define "main" }}
  <main class="max-w-3xl mx-auto px-4 py-16">
    <div class="prose prose-invert max-w-none mb-10
                prose-p:text-foreground-muted
                prose-a:text-primary prose-a:no-underline hover:prose-a:underline prose-a:underline-offset-4
                prose-em:text-foreground">
      {{ .Content }}
    </div>
    <ul class="space-y-3">
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a href="{{ .RelPermalink }}"
             class="font-display text-xl text-primary hover:text-primary-hover underline underline-offset-4 decoration-primary/40 hover:decoration-primary">{{ .LinkTitle }}</a>
        </li>
      {{ end }}
    </ul>
    <p class="mt-16">
      <a href="/" class="text-primary hover:text-primary-hover underline underline-offset-4">&larr; Back to home</a>
    </p>
  </main>
{{ end }}
