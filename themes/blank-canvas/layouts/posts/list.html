{{ define "main" }}
  <main class="max-w-3xl mx-auto px-4 py-12">
    <div class="prose prose-slate max-w-none mb-8">{{ .Content }}</div>
    <ul class="space-y-2">
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a href="{{ .RelPermalink }}" class="text-xl text-blue-700 hover:underline">{{ .LinkTitle }}</a>
        </li>
      {{ end }}
    </ul>
    <p class="mt-12">
      <a href="/" class="text-blue-600 hover:underline">&larr; Back to home</a>
    </p>
  </main>
{{ end }}
