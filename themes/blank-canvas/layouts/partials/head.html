<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&display=swap">

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: '#1f2527',
          foreground: {
            DEFAULT: '#ffffff',
            muted: '#e6e6e6',
          },
          primary: {
            DEFAULT: '#9fd3e8',
            hover: '#ffffff',
          },
          secondary: {
            DEFAULT: '#fbe6aa',
            hover: '#ffffff',
          },
          tertiary: '#364043',
        },
        fontFamily: {
          display: ['"Lora"', 'Georgia', 'serif'],
          body: ['"Fira Sans"', 'system-ui', 'sans-serif'],
        },
      },
    },
  }
</script>

<style media="print">
  /* Revert dark theme for print so ink is black on white paper. */
  body { background: #ffffff !important; color: #000000 !important; }
  .prose-invert, .prose-invert * { color: #000000 !important; }
  .prose-invert a { color: #000000 !important; text-decoration: underline; }
  .prose-invert code,
  .prose-invert pre { background: #f4f4f4 !important; color: #000000 !important; }
  .prose-invert blockquote { border-color: #000000 !important; }
</style>

<meta name="description" content="Harness the power of unit testing to write clean code that works; fast and with confidence." />
<meta property="og:title" content="TDD in Swift" />
<meta property="og:description" content="Harness the power of unit testing to write clean code that works; fast and with confidence." />
<meta property="og:image" content="https://tddinswift.com/wp-content/uploads/2025/03/94f74-9781484270011-1-copy.jpg" />
<meta name="twitter:card" content="summary_large_image" />
