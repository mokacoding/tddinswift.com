<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="bg-white text-gray-800 font-sans leading-relaxed">
  <header>
    {{ partial "header.html" . }}
  </header>
  <main class="max-w-3xl mx-auto px-4 py-12">
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>
</body>
</html>
